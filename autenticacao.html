<!DOCTYPE html>
<html lang="pt-PT">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
  default-src 'self'; 
  script-src 'self' 'unsafe-inline'; 
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
  img-src 'self' data: https://*.supabase.co https://images.unsplash.com https://via.placeholder.com; 
  connect-src 'self' https://*.supabase.co https://script.google.com https://script.googleusercontent.com;
  font-src 'self' https://fonts.gstatic.com;
">
    <title>Acesso ao Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        .auth-container h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-auth { width: 100%; padding: 12px; background: #232f3e; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-auth:hover { background: #37475a; }
        .btn-auth:disabled { background: #ccc; cursor: not-allowed; }
        .toggle-text { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .toggle-text a { color: #0066cc; text-decoration: none; font-weight: bold; }
        .toggle-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="container-login">
            <h2>Iniciar Sessão</h2>
            <form id="form-login" onsubmit="processarLogin(event)">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="o_teu_email@gmail.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Palavra-passe</label>
                    <input type="password" id="login-password" required placeholder="Introduz a tua palavra-passe">
                </div>
                <button type="submit" id="btn-login" class="btn-auth">Entrar</button>
            </form>
            <div class="toggle-text">
                Não tem conta? <a href="#" onclick="alternarFormularios()">Regista-te aqui</a>
            </div>
        </div>

        <div id="container-registo" style="display: none;">
            <h2>Criar Conta</h2>
            <form id="form-registo" onsubmit="processarRegisto(event)">
                <div class="form-group">
                    <label for="registo-tipo">Tipo de Conta</label>
                    <select id="registo-tipo" required>
                        <option value="comprador">Comprador (Quero comprar produtos)</option>
                        <option value="vendedor">Vendedor (Quero comercializar produtos)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="registo-nome">Nome Completo</label>
                    <input type="text" id="registo-nome" required placeholder="Hélder Filipe">
                </div>
                <div class="form-group">
                    <label for="registo-email">E-mail</label>
                    <input type="email" id="registo-email" required placeholder="exemplo@gmail.com">
                </div>
                <div class="form-group">
                    <label for="registo-password">Palavra-passe</label>
                    <input type="password" id="registo-password" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="registo-telemovel">Telemóvel</label>
                    <input type="tel" id="registo-telemovel" required placeholder="9XXXXXXXX">
                </div>
                <div class="form-group">
                    <label for="registo-morada">Morada</label>
                    <input type="text" id="registo-morada" required placeholder="Rua, Nº, Andar">
                </div>
                <div class="form-group">
                    <label for="registo-localidade">Localidade</label>
                    <input type="text" id="registo-localidade" required placeholder="Quarteira">
                </div>
                <div class="form-group">
                    <label for="registo-cp">Código Postal</label>
                    <input type="text" id="registo-cp" required placeholder="8125-XXX">
                </div>
                <button type="submit" id="btn-registo" class="btn-auth">Criar Conta</button>
            </form>
            <div class="toggle-text">
                Já tem conta? <a href="#" onclick="alternarFormularios()">Inicie sessão aqui</a>
            </div>
        </div>
    </div>

    <script>
        // 1. INICIALIZAÇÃO DO SUPABASE
        const SUPABASE_URL = "https://jbyhbofonlyogbadzcfu.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpieWhib2Zvbmx5b2diYWR6Y2Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjA0NDcsImV4cCI6MjA5OTY5NjQ0N30.FxzxgcokFS_zfm0HKquAky9oVqEvSpPTYWzhIPXLvcU";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Função Global de Higienização de Segurança (Neutraliza injeções de tags)
        function escaparHTML(texto) {
            if (!texto) return "";
            return String(texto)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;")
                .replace(/\//g, "&#x2F;");
        }

        // 2. FUNÇÃO DE ALTERNÂNCIA 
        function alternarFormularios() {
            const loginForm = document.getElementById("container-login");
            const registoForm = document.getElementById("container-registo");

            if (loginForm.style.display === "none") {
                loginForm.style.display = "block";
                registoForm.style.display = "none";
            } else {
                loginForm.style.display = "none";
                registoForm.style.display = "block";
            }
        }

        // 3. PROCESSAR REGISTO NO SUPABASE
        async function processarRegisto(event) {
            event.preventDefault();
            const botao = document.getElementById("btn-registo");

            // Coleta higienizada limpando espaços em excesso das pontas das strings (.trim())
            const tipo = document.getElementById("registo-tipo").value;
            const nome = document.getElementById("registo-nome").value.trim();
            const email = document.getElementById("registo-email").value.trim().toLowerCase();
            const password = document.getElementById("registo-password").value;
            const morada = document.getElementById("registo-morada").value.trim();
            const localidade = document.getElementById("registo-localidade").value.trim();
            const codigo_postal = document.getElementById("registo-cp").value.trim();
            const telemovel = document.getElementById("registo-telemovel").value.trim();

            try {
                botao.disabled = true;
                botao.innerText = "A criar conta...";

                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    alert("Erro no registo de segurança: " + authError.message);
                    return;
                }

                if (authData.user) {
                    const { error: dbError } = await supabaseClient
                        .from('utilizadores')
                        .insert([
                            {
                                id: authData.user.id,
                                nome: nome,
                                email: email,
                                password: password,
                                morada: morada,
                                localidade: localidade,
                                codigo_postal: codigo_postal,
                                tipo: tipo,
                                telemovel: telemovel,
                                data_criacao: new Date()
                            }
                        ]);

                    if (dbError) {
                        alert("Erro ao guardar dados do perfil: " + dbError.message);
                        return;
                    }

                    alert("Conta criada com sucesso no Supabase! 🎉");
                    document.getElementById("form-registo").reset();
                    alternarFormularios();
                }
            } catch (erro) {
                alert("Erro inesperado no processo de registo.");
                console.error(erro);
            } finally {
                botao.disabled = false;
                botao.innerText = "Criar Conta";
            }
        }

        // 4. PROCESSAR LOGIN
        async function processarLogin(event) {
            event.preventDefault();
            const botao = document.getElementById("btn-login");

            const email = document.getElementById("login-email").value.trim().toLowerCase();
            const password = document.getElementById("login-password").value;

            try {
                botao.disabled = true;
                botao.innerText = "A autenticar...";

                // 1. Iniciar sessão segura com o Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) {
                    alert(`Falha no login: ${authError.message}`);
                    return;
                }

                // 2. Procurar o perfil completo correspondente na BD
                if (authData.user) {
                    const { data: perfil, error: dbError } = await supabaseClient
                        .from('utilizadores')
                        .select('*')
                        .eq('id', authData.user.id)
                        .single(); 

                    if (dbError || !perfil) {
                        alert("Erro ao obter os dados de perfil do utilizador.");
                        console.error(dbError);
                        return;
                    }

                    // 3. Montagem estruturada do objeto de sessão local
                    const dadosSessao = {
                        status: "sucesso",
                        id: perfil.id,
                        nome: perfil.nome,
                        email: perfil.email,
                        morada: perfil.morada,
                        localidade: perfil.localidade,
                        codigo_postal: perfil.codigo_postal,
                        telemovel: perfil.telemovel,
                        tipo: perfil.tipo
                    };

                    localStorage.setItem("usuario_logado", JSON.stringify(dadosSessao));

                    alert(`Bem-vindo, ${perfil.nome}! 🎉`);

                    // 4. Redirecionamento blindado contra quebras de carateres na URL usando encodeURIComponent
                    const pNome = encodeURIComponent(perfil.nome || "");
                    const pEmail = encodeURIComponent(perfil.email || "");
                    const pMorada = encodeURIComponent(perfil.morada || "");
                    const pLocalidade = encodeURIComponent(perfil.localidade || "");
                    const pCP = encodeURIComponent(perfil.codigo_postal || "");
                    const pTelemovel = encodeURIComponent(perfil.telemovel || "");
                    const pTipo = encodeURIComponent(perfil.tipo || "comprador");

                    window.location.href = `index.html?nome=${pNome}&email=${pEmail}&morada=${pMorada}&localidade=${pLocalidade}&cp=${pCP}&telemovel=${pTelemovel}&tipo=${pTipo}`;
                }
            } catch (erro) {
                alert("Erro ao autenticar.");
                console.error(erro);
            } finally {
                botao.disabled = false;
                botao.innerText = "Entrar";
            }
        }
    </script>
</body>
</html>
