<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        .auth-container h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .form-row { display: flex; gap: 10px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .toggle-text { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .toggle-text a { color: #007bff; text-decoration: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="seccao-login">
            <h2>Iniciar Sessão</h2>
            <form id="form-login" onsubmit="processarLogin(event)">
                <div class="form-group">
                    <label for="login-email">E-mail:</label>
                    <input type="email" id="login-email" required placeholder="Ex: joao@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Palavra-passe:</label>
                    <input type="password" id="login-password" required placeholder="Insere a tua palavra-passe">
                </div>
                <button type="submit" id="btn-login">Entrar</button>
            </form>
            <p class="toggle-text">Não tens conta? <a onclick="alternarFormularios()">Regista-te aqui</a></p>
        </div>

        <div id="seccao-registo" class="hidden">
            <h2>Criar Conta</h2>
            <form id="form-registo" onsubmit="processarRegisto(event)">
                <div class="form-group">
                    <label for="registo-tipo">Tipo de Conta:</label>
                    <select id="registo-tipo" required>
                        <option value="comprador">Quero Comprar Artigos (Comprador)</option>
                        <option value="vendedor">Quero Vender Artigos (Vendedor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="registo-nome">Nome Completo:</label>
                    <input type="text" id="registo-nome" required placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label for="registo-email">E-mail:</label>
                    <input type="email" id="registo-email" required placeholder="Ex: joao@email.com">
                </div>
                <div class="form-group">
                    <label for="registo-password">Palavra-passe:</label>
                    <input type="password" id="registo-password" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="registo-morada">Morada:</label>
                    <input type="text" id="registo-morada" required placeholder="Rua, número, andar...">
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label for="registo-localidade">Localidade:</label>
                        <input type="text" id="registo-localidade" required placeholder="Cidade/Vila">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="registo-cp">Cód. Postal:</label>
                        <input type="text" id="registo-cp" required placeholder="0000-000" pattern="\d{4}-\d{3}">
                    </div>
                    <div class="form-group">
                        <label>Telemóvel (Opcional):</label>
                        <input type="tel" id="registo-telemovel" placeholder="9XXXXXXXX">
                    </div>


                </div>

                <button type="submit" id="btn-registo">Criar Conta</button>
            </form>
            <p class="toggle-text">Já tens conta? <a onclick="alternarFormularios()">Inicia sessão aqui</a></p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwTKdQqS2FbB3UZvBD0ulI4YYNk7XQQwGQh0mkYvcKIQSW4UWzOLq3Gmx4lWVF7WvyZXg/exec";

        function alternarFormularios() {
            document.getElementById("seccao-login").classList.toggle("hidden");
            document.getElementById("seccao-registo").classList.toggle("hidden");
        }

        async function processarRegisto(event) {
            event.preventDefault();
            const botao = document.getElementById("btn-registo");

            const dadosUsuario = {
                acao: "registar",
                tipo: document.getElementById("registo-tipo").value,
                nome: document.getElementById("registo-nome").value,
                email: document.getElementById("registo-email").value,
                password: document.getElementById("registo-password").value,
                morada: document.getElementById("registo-morada").value,
                localidade: document.getElementById("registo-localidade").value,
                codigo_postal: document.getElementById("registo-cp").value
            };

            try {
                botao.disabled = true;
                botao.innerText = "A criar conta...";
                const resposta = await fetch(API_URL, {
                    method: "POST", mode: "cors", headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(dadosUsuario)
                });
                const resultado = await resposta.json();
                alert(resultado.mensagem);
                if (resultado.status === "sucesso") { document.getElementById("form-registo").reset(); alternarFormularios(); }
            } catch (erro) { alert("Erro no registo."); } finally { botao.disabled = false; botao.innerText = "Criar Conta"; }
        }

        async function processarLogin(event) {
            event.preventDefault();
            const botao = document.getElementById("btn-login");

            const dadosLogin = {
                acao: "login",
                email: document.getElementById("login-email").value,
                password: document.getElementById("login-password").value
            };

            try {
                botao.disabled = true;
                botao.innerText = "A autenticar...";
                const resposta = await fetch(API_URL, {
                    method: "POST", mode: "cors", headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(dadosLogin)
                });
                const resultado = await resposta.json();

                if (resultado.status === "sucesso") {
                    localStorage.setItem("usuario_logado", JSON.stringify(resultado));
                    // alert(`Bem-vindo, ${resultado.nome}!`);
                    
                    // Envia os dados e o TIPO pelo URL como segurança
                    // Substitui a linha antiga de redirecionamento no autenticacao.html por esta:
                window.location.href = `index.html?nome=${encodeURIComponent(resultado.nome)}&email=${encodeURIComponent(resultado.email)}&morada=${encodeURIComponent(resultado.morada)}&localidade=${encodeURIComponent(resultado.localidade)}&cp=${encodeURIComponent(resultado.codigo_postal)}&telemovel=${encodeURIComponent(resultado.telemovel)}&tipo=${encodeURIComponent(resultado.tipo)}`;
                } else {
                    alert(`Falha no login: ${resultado.mensagem}`);
                }
            } catch (erro) { alert("Erro ao autenticar."); } finally { botao.disabled = false; botao.innerText = "Entrar"; }
        }
    </script>
</body>
</html>
