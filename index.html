<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Digital</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; color: #333; }
        
        /* Top Bar e Linha de Pesquisa */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); gap: 15px; flex-wrap: wrap; }
        .search-container { flex: 1; max-width: 500px; min-width: 250px; position: relative; }
        .search-container input { width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 25px; box-sizing: border-box; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .search-container input:focus { border-color: #ff9900; box-shadow: 0 0 5px rgba(255,153,0,0.3); }
        
        /* Navegação por Categorias */
        .nav-categorias { display: flex; gap: 10px; margin-bottom: 20px; background: #232f3e; padding: 10px; border-radius: 6px; overflow-x: auto; }
        .btn-cat { background: transparent; color: white; border: 1px solid transparent; padding: 6px 12px; font-size: 14px; white-space: nowrap; cursor: pointer; }
        .btn-cat:hover, .btn-cat.active { border-color: white; border-radius: 4px; background: rgba(255,255,255,0.1); }
        
        /* Layout Principal */
        .content-container { display: flex; gap: 30px; flex-wrap: wrap; align-items: flex-start; }
        .vitrine-seccao { flex: 2; min-width: 300px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        /* Cartão de Produto */
        .produto-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: transform 0.2s; }
        .produto-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .produto-card img { max-width: 100%; height: 160px; object-fit: cover; border-radius: 4px; }
        .produto-card h3 { font-size: 16px; margin: 10px 0 5px 0; height: 40px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        /* Secção Lateral do Carrinho Avançado e Retrátil */
        .carrinho-seccao { flex: 1; min-width: 280px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: fit-content; transition: all 0.3s ease; }
        .carrinho-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; cursor: pointer; user-select: none; }
        .carrinho-titulo { display: flex; align-items: center; font-size: 18px; font-weight: bold; margin: 0; }
        .badge-contador { background: #e52f2f; color: white; border-radius: 50%; padding: 3px 8px; font-size: 12px; font-weight: bold; margin-left: 8px; }
        .seta-toggle { font-size: 14px; color: #666; transition: transform 0.3s; margin-left: auto; }
        
        /* Elementos que colapsam */
        .carrinho-conteudo { transition: max-height 0.3s ease-out, opacity 0.2s ease; overflow: hidden; }
        .carrinho-seccao.minimizado .carrinho-conteudo { display: none; }
        .carrinho-seccao.minimizado .seta-toggle { transform: rotate(-90deg); }
        
        .item-carrinho { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; }
        .qtd-controlos { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .btn-qtd { background: #e7e9ec; border: 1px solid #adb1b8; color: #111; padding: 2px 8px; font-size: 14px; font-weight: bold; border-radius: 3px; cursor: pointer; }
        
        .checkout-form { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #f9f9f9; }
        
        /* Janela Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 25px; border-radius: 8px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #666; }
        .modal-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .modal-esquerda { flex: 1; min-width: 200px; text-align: center; }
        .modal-esquerda img { max-width: 100%; max-height: 250px; object-fit: contain; }
        .modal-direita { flex: 1.5; min-width: 250px; }
        
        .amazon-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .amazon-table tr:nth-child(odd) { background-color: #f6f6f6; }
        .amazon-table td { padding: 6px 10px; border: 1px solid #e2e2e2; }
        .amazon-table td.tech-label { font-weight: bold; color: #555; width: 40%; }

        /* Botões Gerais */
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .btn-amazon { background: #ffd814; color: #0f1111; border: 1px solid #fcd200; border-radius: 20px; padding: 8px 15px; width: 100%; font-weight: bold; }
        .btn-amazon:hover { background: #f7ca00; }
        .btn-remover { background: #dc3545; padding: 5px 8px; font-size: 11px; }
        .btn-esvaziar { background: transparent; color: #dc3545; border: none; font-size: 12px; text-decoration: underline; padding: 0; cursor: pointer; margin-left: 10px; }
        .btn-checkout { background: #28a745; width: 100%; margin-top: 15px; font-size: 16px; border-radius: 20px; }
        .btn-checkout:hover { background: #218838; }
        .btn-logout { background: #6c757d; padding: 8px 15px; font-size: 13px; }
        .btn-vendedor { background: #ff9900; color: #111; font-weight: bold; display: none; margin-right: 10px; }
    </style>
</head>
<body>

    <!-- Top Bar com Caixa de Pesquisa Integrada -->
    <div class="top-bar">
        <h1>Marketplace</h1>
        
        <!-- 🟩 CAIXA DE PESQUISA -->
        <div class="search-container">
            <input type="text" id="input-pesquisa" oninput="executarFiltros()" placeholder="Pesquisar por produto, marca ou descrição...">
        </div>

        <div>
            <button id="btn-painel-vendedor" class="btn-vendedor" onclick="abrirPainelVendedor()">Painel do Vendedor ⚙️</button>
            <button class="btn-logout" onclick="terminarSessao()">Sair</button>
        </div>
    </div>

    <!-- Categorias -->
    <div class="nav-categorias">
        <button class="btn-cat active" onclick="filtrarCategoria('Todas', this)">Todos os Departamentos</button>
        <button class="btn-cat" onclick="filtrarCategoria('Eletrónicos', this)">Eletrónicos</button>
        <button class="btn-cat" onclick="filtrarCategoria('Casa e Cozinha', this)">Casa e Cozinha</button>
        <button class="btn-cat" onclick="filtrarCategoria('Vestuário', this)">Vestuário</button>
        <button class="btn-cat" onclick="filtrarCategoria('Desporto', this)">Desporto</button>
        <button class="btn-cat" onclick="filtrarCategoria('Livros', this)">Livros</button>
        <button class="btn-cat" onclick="filtrarCategoria('Ferramentas', this)">Ferramentas</button>
    </div>
    
    <div class="content-container">
        <!-- Montra -->
        <div class="vitrine-seccao">
            <h2 id="titulo-montra">Todos os Artigos</h2>
            <div id="produtos-content" class="vitrine">A carregar produtos...</div>
        </div>
        
        <!-- Carrinho Modernizado e Retrátil -->
        <div id="carrinho-container" class="carrinho-seccao">
            <!-- 🟩 Cabeçalho clicável para Minimizar/Expandir -->
            <div class="carrinho-header" onclick="toggleCarrinho()">
                <div class="carrinho-titulo">
                    Carrinho <span id="carrinho-badge" class="badge-contador">0</span>
                </div>
                <button id="btn-esvaziar-tudo" class="btn-esvaziar" onclick="event.stopPropagation(); esvaziarCarrinho();" style="display: none;">Esvaziar</button>
                <span class="seta-toggle">▼</span>
            </div>
            
            <!-- Conteúdo que encolhe/desaparece -->
            <div class="carrinho-conteudo">
                <div id="carrinho-itens">O carrinho está vazio.</div>
                <h3 style="margin-top: 20px; text-align: right;">Total: <span id="carrinho-total">0.00</span>€</h3>
                
                <form id="formulario-checkout" class="checkout-form" onsubmit="finalizarCompra(event)">
                    <h3>Dados de Envio</h3>
                    <div class="form-group"><label>Nome Completo:</label><input type="text" id="nome" required readonly></div>
                    <div class="form-group"><label>E-mail:</label><input type="email" id="email" required readonly></div>
                    <div class="form-group"><label>Morada de Entrega:</label><input type="text" id="morada" required readonly></div>
                    <div style="display:flex; gap:10px;">
                        <div class="form-group" style="flex:2;"><label>Localidade:</label><input type="text" id="localidade" required readonly></div>
                        <div class="form-group" style="flex:1;"><label>Cód. Postal:</label><input type="text" id="cp" required readonly></div>
                    </div>
                    <button type="submit" id="btn-finalizar" class="btn-checkout">Finalizar Encomenda</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Janela Modal -->
    <div id="modal-detalhes" class="modal" onclick="fecharModalExterno(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <div class="modal-grid">
                <div class="modal-esquerda"><img id="modal-img" src="" alt=""></div>
                <div class="modal-direita">
                    <h2 id="modal-nome" style="font-size: 20px; margin-top:0;"></h2>
                    <p id="modal-descricao" style="color: #444; font-size: 14px; line-height: 1.4;"></p>
                    <p style="font-size: 22px; color: #b12704; margin: 10px 0;"><strong><span id="modal-preco"></span>€</strong></p>
                    <h3>Detalhes Técnicos</h3><table class="amazon-table" id="table-tecnica"></table>
                    <h3>Informações Adicionais</h3><table class="amazon-table" id="table-logistica"></table>
                    <div style="margin-top:20px; padding-top:15px; border-top: 1px solid #eee;">
                        <button id="modal-btn-adicionar" class="btn-amazon">Adicionar ao Carrinho</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONTROLO DE ACESSO ---
        let usuarioLogado = JSON.parse(localStorage.getItem("usuario_logado"));
        if (!usuarioLogado) {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('email')) {
                usuarioLogado = {
                    nome: urlParams.get('nome'), email: urlParams.get('email'),
                    morada: urlParams.get('morada'), localidade: urlParams.get('localidade'),
                    codigo_postal: urlParams.get('cp'), tipo: urlParams.get('tipo')
                };
                try { localStorage.setItem("usuario_logado", JSON.stringify(usuarioLogado)); } catch(e){}
            }
        }
        if (!usuarioLogado) { alert("Acesso restrito."); window.location.href = "autenticacao.html"; }

        if (usuarioLogado && usuarioLogado.tipo === "vendedor") {
            document.getElementById("btn-painel-vendedor").style.display = "inline-block";
        }

        function abrirPainelVendedor() {
            window.location.href = `painel-vendedor.html?nome=${encodeURIComponent(usuarioLogado.nome)}&email=${encodeURIComponent(usuarioLogado.email)}&tipo=vendedor`;
        }

        function terminarSessao() { localStorage.removeItem("usuario_logado"); window.location.href = "autenticacao.html"; }

        // --- LÓGICA DE PRODUTOS, FILTROS E PESQUISA ---
        const API_URL = "https://script.google.com/macros/s/AKfycbwTKdQqS2FbB3UZvBD0ulI4YYNk7XQQwGQh0mkYvcKIQSW4UWzOLq3Gmx4lWVF7WvyZXg/exec";
        let todosProdutos = []; 
        let categoriaAtual = "Todas"; // Guarda a categoria ativa
        let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

        async function carregarProdutos() {
            try {
                const resposta = await fetch(API_URL);
                todosProdutos = await resposta.json();
                renderizarVitrine(todosProdutos);
            } catch (erro) { document.getElementById("produtos-content").innerText = "Erro ao carregar produtos."; }
        }

        function renderizarVitrine(lista) {
            const vitrine = document.getElementById("produtos-content");
            vitrine.innerHTML = "";
            if (lista.length === 0) { vitrine.innerText = "Nenhum produto corresponde aos critérios."; return; }

            lista.forEach(produto => {
                const card = document.createElement("div");
                card.className = "produto-card";
                card.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') abrirModalDetalhes(produto);
                };
                
                const temStock = Number(produto.stock) > 0;
                card.innerHTML = `
                    <img src="${produto.imagem_url || 'https://via.placeholder.com/150'}" alt="${produto.nome}">
                    <h3>${produto.nome}</h3>
                    <p><small style="color: ${temStock ? 'green' : 'red'}">Disponível: ${produto.stock} un.</small></p>
                    <p><strong>${Number(produto.preco).toFixed(2)}€</strong></p>
                    <div style="margin-top: 10px; display:flex; gap:5px; ${!temStock ? 'display:none;' : ''}">
                        <input type="number" id="qtd-${produto.id}" value="1" min="1" max="${produto.stock}" style="width: 45px; text-align: center;">
                        <button style="flex:1; font-size:12px;" onclick="prepararAdicao('${produto.id}', '${produto.nome}', ${produto.preco}, ${produto.stock})">Adicionar</button>
                    </div>
                    ${!temStock ? '<button disabled style="margin-top:10px;">Sem Stock</button>' : ''}
                `;
                vitrine.appendChild(card);
            });
        }

        // 🟩 CONTROLADOR DE FILTROS UNIFICADO (Combina Categoria + Caixa de Pesquisa)
        function executarFiltros() {
            const termoPesquisa = document.getElementById("input-pesquisa").value.toLowerCase().trim();
            
            let resultado = todosProdutos;

            // 1. Filtra primeiro por categoria, se não for "Todas"
            if (categoriaAtual !== "Todas") {
                resultado = resultado.filter(p => p.categoria === categoriaAtual);
            }

            // 2. Filtra a seguir pelo termo da barra de pesquisa
            if (termoPesquisa !== "") {
                resultado = resultado.filter(p => {
                    const nome = (p.nome || "").toLowerCase();
                    const desc = (p.descricao || "").toLowerCase();
                    const cat = (p.categoria || "").toLowerCase();
                    // Pesquisa também dentro das propriedades técnicas em formato string
                    const tech = (p.detalhes_tecnicos || "").toLowerCase(); 

                    return nome.includes(termoPesquisa) || 
                           desc.includes(termoPesquisa) || 
                           cat.includes(termoPesquisa) ||
                           tech.includes(termoPesquisa);
                });
            }

            renderizarVitrine(resultado);
        }

        function filtrarCategoria(categoria, botao) {
            document.querySelectorAll(".btn-cat").forEach(btn => btn.classList.remove("active"));
            botao.classList.add("active");
            
            categoriaAtual = categoria; // Atualiza o estado global
            document.getElementById("titulo-montra").innerText = categoria === "Todas" ? "Todos os Artigos" : categoria;
            
            executarFiltros(); // Corre o motor de filtros unificado
        }

        // --- 🟩 LÓGICA MINIMIZAR / EXPANDIR CARRINHO ---
        function toggleCarrinho() {
            const carrinhoBox = document.getElementById("carrinho-container");
            carrinhoBox.classList.toggle("minimizado");
        }

        // --- MODAL DETALHES ---
        function abrirModalDetalhes(produto) {
            document.getElementById("modal-img").src = produto.imagem_url || 'https://via.placeholder.com/150';
            document.getElementById("modal-nome").innerText = produto.nome;
            document.getElementById("modal-descricao").innerText = produto.descricao;
            document.getElementById("modal-preco").innerText = Number(produto.preco).toFixed(2);

            const tabelaTecnica = document.getElementById("table-tecnica"); tabelaTecnica.innerHTML = "";
            try {
                const techObj = JSON.parse(produto.detalhes_tecnicos || "{}");
                if (Object.keys(techObj).length === 0) tabelaTecnica.innerHTML = "<tr><td>Sem especificações adicionais.</td></tr>";
                else { for (let [ch, val] of Object.entries(techObj)) tabelaTecnica.innerHTML += `<tr><td class="tech-label">${ch}</td><td>${val}</td></tr>`; }
            } catch(e) { tabelaTecnica.innerHTML = "<tr><td>Erro ao ler especificações.</td></tr>"; }

            const tabelaLogistica = document.getElementById("table-logistica"); tabelaLogistica.innerHTML = "";
            try {
                const logObj = JSON.parse(produto.informacoes || "{}");
                tabelaLogistica.innerHTML += `<tr><td class="tech-label">Fabricante</td><td>${logObj.fabricante || 'N/D'}</td></tr>`;
                tabelaLogistica.innerHTML += `<tr><td class="tech-label">Peso do Artigo</td><td>${logObj.peso ? logObj.peso + ' kg' : 'N/D'}</td></tr>`;
                tabelaLogistica.innerHTML += `<tr><td class="tech-label">Dimensões</td><td>${logObj.dimensoes || 'N/D'}</td></tr>`;
            } catch(e) { tabelaLogistica.innerHTML = "<tr><td>Erro ao ler logística.</td></tr>"; }

            const btnModalAdicionar = document.getElementById("modal-btn-adicionar");
            if (Number(produto.stock) > 0) {
                btnModalAdicionar.disabled = false; btnModalAdicionar.innerText = "Adicionar ao Carrinho";
                btnModalAdicionar.onclick = () => { adicionarAoCarrinho(produto.id, produto.nome, produto.preco, 1); fecharModal(); };
            } else { btnModalAdicionar.disabled = true; btnModalAdicionar.innerText = "Esgotado"; }
            document.getElementById("modal-detalhes").style.display = "flex";
        }

        function fecharModal() { document.getElementById("modal-detalhes").style.display = "none"; }
        function fecharModalExterno(e) { if (e.target.id === "modal-detalhes") fecharModal(); }

        // --- GESTÃO DO CARRINHO ---
        function prepararAdicao(id, nome, preco, stockMaximo) {
            const inputQtd = document.getElementById(`qtd-${id}`);
            const quantidade = parseInt(inputQtd.value) || 1;
            if (quantidade < 1 || quantidade > stockMaximo) { alert("Quantidade indisponível."); return; }
            adicionarAoCarrinho(id, nome, preco, quantidade);
            inputQtd.value = 1;
        }

        function adicionarAoCarrinho(id, nome, preco, quantidade) {
            const itemExistente = carrinho.find(item => item.id_produto === id);
            const prodBase = todosProdutos.find(p => p.id === id);
            const stockLimite = prodBase ? Number(prodBase.stock) : 999;

            if (itemExistente) {
                if (itemExistente.quantidade + quantidade > stockLimite) {
                    alert(`Não podes adicionar mais unidades. Limite: ${stockLimite} un.`);
                    itemExistente.quantidade = stockLimite;
                } else { itemExistente.quantidade += quantity = quantidade; }
            } else { carrinho.push({ id_produto: id, nome_produto: nome, preco_unitario: Number(preco), quantidade: quantidade }); }
            
            // Força a expansão do carrinho ao adicionar um novo produto para dar feedback visual
            document.getElementById("carrinho-container").classList.remove("minimizado");
            
            atualizarInterfaceCarrinho();
        }

        function alterarQuantidadeCarrinho(id, delta) {
            const item = carrinho.find(item => item.id_produto === id);
            if (!item) return;
            const prodBase = todosProdutos.find(p => p.id === id);
            const stockLimite = prodBase ? Number(prodBase.stock) : 999;

            if (item.quantidade + delta > stockLimite) { alert(`Stock máximo atingido (${stockLimite} un.).`); return; }
            item.quantidade += delta;
            if (item.quantidade <= 0) carrinho = carrinho.filter(i => i.id_produto !== id);
            atualizarInterfaceCarrinho();
        }

        function removerDoCarrinho(id) {
            carrinho = carrinho.filter(item => item.id_produto !== id);
            atualizarInterfaceCarrinho();
        }

        function esvaziarCarrinho() {
            if(confirm("Limpar o carrinho?")) { carrinho = []; atualizarInterfaceCarrinho(); }
        }

        function atualizarInterfaceCarrinho() {
            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            const contentorItens = document.getElementById("carrinho-itens");
            const elementoTotal = document.getElementById("carrinho-total");
            const formCheckout = document.getElementById("formulario-checkout");
            const badge = document.getElementById("carrinho-badge");
            const btnEsvaziar = document.getElementById("btn-esvaziar-tudo");
            
            const totalItens = carrinho.reduce((acc, item) => acc + item.quantidade, 0);
            badge.innerText = totalItens;

            if (carrinho.length === 0) {
                contentorItens.innerHTML = "O carrinho está vazio.";
                elementoTotal.innerText = "0.00";
                formCheckout.style.display = "none"; btnEsvaziar.style.display = "none";
                return;
            }

            contentorItens.innerHTML = "";
            let totalAcumulado = 0;
            btnEsvaziar.style.display = "block";

            carrinho.forEach(item => {
                const custoItem = item.preco_unitario * item.quantidade;
                totalAcumulado += custoItem;
                const div = document.createElement("div");
                div.className = "item-carrinho";
                div.innerHTML = `
                    <div>
                        <strong>${item.nome_produto}</strong><br>
                        <div class="qtd-controlos">
                            <button class="btn-qtd" onclick="alterarQuantidadeCarrinho('${item.id_produto}', -1)">-</button>
                            <span>${item.quantidade}x</span>
                            <button class="btn-qtd" onclick="alterarQuantidadeCarrinho('${item.id_produto}', 1)">+</button>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <span style="display:block; margin-bottom:5px;">${custoItem.toFixed(2)}€</span>
                        <button type="button" class="btn-remover" onclick="removerDoCarrinho('${item.id_produto}')">Remover</button>
                    </div>
                `;
                contentorItens.appendChild(div);
            });

            elementoTotal.innerText = totalAcumulado.toFixed(2);
            formCheckout.style.display = "block";
            
            if (usuarioLogado) {
                document.getElementById("nome").value = usuarioLogado.nome;
                document.getElementById("email").value = usuarioLogado.email;
                document.getElementById("morada").value = usuarioLogado.morada || "";
                document.getElementById("localidade").value = usuarioLogado.localidade || "";
                document.getElementById("cp").value = usuarioLogado.codigo_postal || "";
            }
        }

        async function finalizarCompra(event) {
            event.preventDefault(); 
            const totalFinal = carrinho.reduce((acc, item) => acc + (item.preco_unitario * item.quantidade), 0);
            const dadosEncomenda = { acao: "comprar", cliente_nome: usuarioLogado.nome, cliente_email: usuarioLogado.email, total: totalFinal, itens: carrinho };
            const botao = document.getElementById("btn-finalizar");
            try {
                botao.disabled = true; botao.innerText = "A processar...";
                const response = await fetch(API_URL, { method: "POST", mode: "cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(dadosEncomenda) });
                const resultado = await response.json();
                if (resultado.status === "sucesso") { alert(`Encomenda efetuada! ID: ${resultado.id}`); carrinho = []; atualizarInterfaceCarrinho(); } 
                else { alert(`Erro: ${resultado.mensagem}`); }
            } catch (erro) { alert("Pedido enviado com sucesso!"); carrinho = []; atualizarInterfaceCarrinho(); } 
            finally { botao.disabled = false; botao.innerText = "Finalizar Encomenda"; }
        }

        carregarProdutos();
        atualizarInterfaceCarrinho();
    </script>
</body>
</html>
