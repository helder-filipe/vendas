<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As Minhas Encomendas - Koolaction</title>
    
    <link rel="icon" type="image/x-icon" href="koolaction.ico">

    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f4f4; 
            color: #333; 
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }
        
        .main-wrapper { padding: 20px; box-sizing: border-box; }
        
        /* Cabeçalho Superior */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-container { display: flex; align-items: center; cursor: pointer; }
        .logo-container img { height: 60px; width: auto; display: block; object-fit: contain; }
        
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .saudacao-user { font-size: 14px; font-weight: bold; color: #555; }
        
        /* Botões */
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: background 0.2s; font-size: 14px; }
        button:hover { background: #0056b3; }
        .btn-voltar { background: #232f3e; }
        .btn-voltar:hover { background: #19222d; }

        /* Contentor do Histórico */
        .historico-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; color: #232f3e; }

        /* Lista de Encomendas */
        .encomenda-card { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; overflow: hidden; background: #fff; }
        .encomenda-header { background: #f6f6f6; padding: 12px 15px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; font-size: 13px; border-bottom: 1px solid #ddd; }
        .encomenda-header strong { color: #111; }
        .encomenda-body { padding: 15px; }
        
        /* Estados da Encomenda */
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .status-pendente { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-processamento { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .status-enviado { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* Tabela de Itens por Encomenda */
        .itens-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .itens-table th { background: #f9f9f9; text-align: left; padding: 8px; border-bottom: 2px solid #eee; color: #666; }
        .itens-table td { padding: 8px; border-bottom: 1px solid #eee; }

        /* Rodapé */
        footer { background: #131a22; color: #a6b1bb; font-size: 12px; width: 100%; box-sizing: border-box; }
        .footer-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; }
        .footer-col { flex: 1; min-width: 200px; }
        .footer-col h3 { color: #eaeded; font-size: 13px; margin-top: 0; margin-bottom: 8px; border-bottom: 1px solid #232f3e; padding-bottom: 3px; }
        .footer-col p { line-height: 1.5; color: #96a2af; margin: 3px 0; }
        .footer-bottom { background: #19222d; text-align: center; padding: 12px 20px; font-size: 11px; color: #8492a0; border-top: 1px solid #232f3e; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="koolaction.png" alt="Koolaction" onerror="this.style.display='none'; document.getElementById('placeholder-txt').style.display='block';">
                <div id="placeholder-txt" style="font-size:22px; font-weight:bold; color:#ff9900; display:none;">Koolaction</div>
            </div>
            <div class="user-menu">
                <span id="saudacao-texto" class="saudacao-user">A carregar sessão...</span>
                <button class="btn-voltar" onclick="window.location.href='index.html'">🛒 Voltar à Loja</button>
                <button id="btn-painel-vendedor" onclick="abrirPainelVendedor()" style="display: none; background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    Painel de Vendedor
                </button>
                <button style="background: #cc0000;" onclick="terminarSessao()">Sair</button>
            </div>
        </div>

        <div class="historico-container">
            <h2>Histórico de Encomendas</h2>
            <div id="lista-encomendas-content">A carregar o teu histórico...</div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-col">
                <h3>A Nossa Sede</h3>
                <p><strong>AlphaMarket S.A.</strong></p>
                <p>Parque Empresarial do Infante, Lote 14-B</p>
                <p>8125-401 Quarteira, Portugal</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 AlphaMarket S.A. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwTKdQqS2FbB3UZvBD0ulI4YYNk7XQQwGQh0mkYvcKIQSW4UWzOLq3Gmx4lWVF7WvyZXg/exec";
        
        // --- CONTROLO DE ACESSO E SESSÃO ---
        let usuarioLogado = JSON.parse(localStorage.getItem("usuario_logado"));

        const urlParams = new URLSearchParams(window.location.search);
        const emailURL = urlParams.get('email');

        if (emailURL) {
            usuarioLogado = {
                nome: urlParams.get('nome') || (usuarioLogado ? usuarioLogado.nome : ""),
                email: emailURL,
                morada: urlParams.get('morada') || (usuarioLogado ? usuarioLogado.morada : ""),
                localidade: urlParams.get('localidade') || (usuarioLogado ? usuarioLogado.localidade : ""),
                codigo_postal: urlParams.get('codigo_postal') || urlParams.get('cp') || (usuarioLogado ? usuarioLogado.codigo_postal : ""),
                tipo: urlParams.get('tipo') || (usuarioLogado ? usuarioLogado.tipo : "comprador")
            };
            localStorage.setItem("usuario_logado", JSON.stringify(usuarioLogado));
        }

        if (!usuarioLogado || !usuarioLogado.email) {
            alert("Sessão expirada ou utilizador não identificado. Por favor, faça login.");
            window.location.href = "autenticacao.html";
        } else {
            const saudacao = document.getElementById("saudacao-texto");
            if (saudacao) {
                saudacao.innerText = `Olá, ${usuarioLogado.nome}!`;
            }
        }

        // 🟩 CONTROLO SEGURO DO PAINEL DE VENDEDOR
        const btnVendedor = document.getElementById("btn-painel-vendedor");
        if (btnVendedor) {
            if (usuarioLogado && usuarioLogado.tipo === "vendedor") {
                btnVendedor.style.display = "inline-block";
            } else {
                btnVendedor.style.display = "none";
            }
        }

        function abrirPainelVendedor() {
            if (usuarioLogado && usuarioLogado.tipo === "vendedor") {
                window.location.href = `painel-vendedor.html?nome=${encodeURIComponent(usuarioLogado.nome)}&email=${encodeURIComponent(usuarioLogado.email)}&tipo=vendedor`;
            } else {
                alert("Acesso negado.");
            }
        }

        function terminarSessao() { 
            localStorage.removeItem("usuario_logado"); 
            localStorage.removeItem("carrinho"); 
            window.location.href = "autenticacao.html"; 
        }

        // 🟩 FUNÇÃO ATUALIZADA NA ÍNTEGRA: HISTÓRICO COM ARTIGOS DETALHADOS E TRANSPORTE ISOLADO
        async function carregarHistorico() {
            const container = document.getElementById("lista-encomendas-content");
            if (!usuarioLogado || !usuarioLogado.email) return;

            try {
                // Chamada via POST estruturado para o teu Apps Script
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        acao: "historico",
                        email: usuarioLogado.email
                    })
                });
                
                const encomendas = await response.json();

                if (!encomendas || encomendas.length === 0) {
                    container.innerHTML = "<p style='color:#666;'>Ainda não efetuaste nenhuma encomenda no nosso site.</p>";
                    return;
                }

                container.innerHTML = ""; 

                encomendas.forEach(enc => {
                    let statusClass = "status-pendente";
                    let estadoText = enc.estado || "Pendente";
                    if (estadoText.toLowerCase() === "em processamento") statusClass = "status-processamento";
                    if (estadoText.toLowerCase() === "enviado") statusClass = "status-enviado";

                    // Formatação correta da data da encomenda
                    let dataFormatada = enc.data ? new Date(enc.data).toLocaleDateString('pt-PT') : 'N/D';
                    
                    // LÓGICA LOGÍSTICA: Valida se a encomenda já foi fechada com a Entrega Real ou exibe a Estimativa
                    let statusEntregaHTML = "";
                    if (enc.entrega_real && enc.entrega_real.trim() !== "") {
                        let realFormatada = new Date(enc.entrega_real).toLocaleDateString('pt-PT');
                        statusEntregaHTML = `
                            <div style="background: #e6f4ea; border-left: 4px solid #28a745; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; color: #137333;">
                                <strong>✓ Entregue em:</strong> ${realFormatada}
                            </div>
                        `;
                    } else {
                        let estFormatada = enc.estimativa_entrega && enc.estimativa_entrega !== "N/D" ? new Date(enc.estimativa_entrega).toLocaleDateString('pt-PT') : 'N/D';
                        statusEntregaHTML = `
                            <div style="background: #fff8e1; border-left: 4px solid #ffb300; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; color: #b78103;">
                                <strong>⏳ Previsão de Entrega:</strong> ${estFormatada}
                            </div>
                        `;
                    }

                    // 🟩 EXTRAÇÃO INTELIGENTE: Separa a string "Artigo (Qtdx)" em linhas reais de tabela
                    let linhasArtigosHTML = "";
                    let totalArtigosPuros = 0;
                    const arrayItens = enc.itens ? enc.itens.split(", ") : [];

                    if (arrayItens.length > 0 && enc.itens) {
                        arrayItens.forEach(itemTexto => {
                            // Extrai o nome e a quantidade usando uma Expressão Regular (Ex: "Nome Produto (2x)")
                            let match = itemTexto.match(/(.*)\s\((\d+)x\)/);
                            if (match) {
                                let nomeArtigo = match[1].trim();
                                let qtdArtigo = parseInt(match[2]);
                                
                                // Como não guardamos o preço un. nesta tabela principal, deixamos oculto ou aproximado,
                                // focando na transparência de listar o artigo e a quantidade exata.
                                linhasArtigosHTML += `
                                    <tr style="border-bottom: 1px dashed #eee;">
                                        <td style="padding: 8px 0; color:#333; font-weight:500;">📦 ${nomeArtigo}</td>
                                        <td style="text-align:center; padding: 8px 0;">${qtdArtigo}x</td>
                                        <td style="text-align:right; padding: 8px 0; color:#777;">-</td>
                                        <td style="text-align:right; padding: 8px 0; color:#333;">Incluído</td>
                                    </tr>
                                `;
                            } else {
                                // Fallback de segurança se a string não estiver no formato padrão
                                linhasArtigosHTML += `
                                    <tr style="border-bottom: 1px dashed #eee;">
                                        <td style="padding: 8px 0; color:#333;">📦 ${itemTexto}</td>
                                        <td style="text-align:center; padding: 8px 0;">1x</td>
                                        <td style="text-align:right; padding: 8px 0; color:#777;">-</td>
                                        <td style="text-align:right; padding: 8px 0; color:#333;">Incluído</td>
                                    </tr>
                                `;
                            }
                        });
                    } else {
                        // Caso não existam dados convertidos, exibe o resumo guardado por segurança
                        linhasArtigosHTML = `
                            <tr style="border-bottom: 1px dashed #eee;">
                                <td style="padding: 8px 0; color:#555;">${enc.itens || "Artigos da encomenda"}</td>
                                <td style="text-align:center; padding: 8px 0;">-</td>
                                <td style="text-align:right; padding: 8px 0;">-</td>
                                <td style="text-align:right; padding: 8px 0;">-</td>
                            </tr>
                        `;
                    }

                    // 🟩 DISCRIMINAÇÃO DO TRANSPORTE E DO TOTAL FINAL DO HISTÓRICO
                    const custoTransporte = Number(enc.custo_transporte) || 0;
                    const subtotalProdutos = Number(enc.total) - custoTransporte;

                    let linhasTotaisHTML = `
                        <tr style="color: #666; font-size: 12px;">
                            <td colspan="2" style="padding: 8px 0 2px 0; text-align:right;">Subtotal Artigos:</td>
                            <td colspan="2" style="padding: 8px 0 2px 0; text-align:right;">${subtotalProdutos.toFixed(2)}€</td>
                        </tr>
                        <tr style="color: #0056b3; font-size: 12px; font-weight: bold;">
                            <td colspan="2" style="padding: 2px 0 6px 0; text-align:right;">🚚 Custo de Transporte:</td>
                            <td colspan="2" style="padding: 2px 0 6px 0; text-align:right;">${custoTransporte > 0 ? custoTransporte.toFixed(2) + '€' : 'Grátis'}</td>
                        </tr>
                        <tr style="border-top: 1px solid #ddd; font-size: 14px; font-weight: bold; color: #b12704;">
                            <td colspan="2" style="padding: 8px 0 0 0; text-align:right;">Total Pago (com Portes):</td>
                            <td colspan="2" style="padding: 8px 0 0 0; text-align:right; font-size: 16px;">${Number(enc.total).toFixed(2)}€</td>
                        </tr>
                    `;

                    const card = document.createElement("div");
                    card.className = "encomenda-card";
                    card.style.marginBottom = "25px";
                    card.style.boxShadow = "0 2px 8px rgba(0,0,0,0.05)";
                    card.style.borderRadius = "6px";
                    
                    card.innerHTML = `
                        <div class="encomenda-header" style="display: flex; gap: 15px; background: #f6f6f6; padding: 12px; border-radius: 6px 6px 0 0; font-size: 13px; color: #555;">
                            <div><strong>Encomenda Efetuada:</strong><br>${dataFormatada} às ${enc.hora || "00:00"}</div>
                            <div><strong>Total:</strong><br><span style="color:#b12704; font-weight:bold; font-size:14px;">${Number(enc.total).toFixed(2)}€</span></div>
                            <div><strong>Enviar para:</strong><br><span style="color:#333; font-weight:bold;">${enc.cliente_nome || usuarioLogado.nome}</span></div>
                            <div style="margin-left:auto; text-align:right;">
                                <strong>ID da Encomenda:</strong> #${enc.id_encomenda}<br>
                                <span class="status-badge ${statusClass}" style="display: inline-block; padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 11px; margin-top: 3px;">${estadoText}</span>
                            </div>
                        </div>
                        
                        <div class="encomenda-body" style="padding: 15px; background: white; border: 1px solid #eef2f5; border-top: none; border-radius: 0 0 6px 6px;">
                            ${statusEntregaHTML}
                            
                            <div style="background: #fdfdfd; border: 1px solid #eef2f5; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 18px;">💳</span>
                                <div>
                                    <strong style="color: #555;">Método de Pagamento escolhido:</strong> 
                                    <span style="color: #0056b3; font-weight: bold;">${enc.metodo_pagamento}</span> 
                                    <span style="color: #666; margin-left: 10px; font-style: italic;">(${enc.detalhe_pagamento})</span>
                                </div>
                            </div>

                            <div style="background: #f9f9f9; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; color:#555; line-height:1.5;">
                                <strong>📍 Detalhes de Envio:</strong><br>
                                Morada: ${enc.entrega_morada || "N/D"}, ${enc.entrega_localidade || "N/D"} (${enc.entrega_cp || "N/D"})<br>
                                Contacto Logístico: ${enc.entrega_telemovel || "N/D"}
                            </div>

                            <table class="itens-table" style="width:100%; border-collapse: collapse; font-size:13px;">
                                <thead>
                                    <tr style="border-bottom: 1px solid #ddd; color:#666; text-align:left;">
                                        <th style="padding:6px 0; width: 55%;">Artigo</th>
                                        <th style="text-align:center; padding:6px 0; width: 15%;">Qtd.</th>
                                        <th style="text-align:right; padding:6px 0; width: 15%;">Preço Un.</th>
                                        <th style="text-align:right; padding:6px 0; width: 15%;">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${linhasArtigosHTML}
                                    ${linhasTotaisHTML}
                                </tbody>
                            </table>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Erro crítico ao renderizar o histórico:", error);
                container.innerHTML = "<p style='color:red; font-weight:bold; text-align:center;'>⚠️ Erro ao carregar o histórico. Por favor tenta mais tarde.</p>";
            }
        }

        // 🟩 TRIGER DA FUNÇÃO: Executa o carregamento assim que o script corre
        carregarHistorico();
    </script>
</body>
</html>
